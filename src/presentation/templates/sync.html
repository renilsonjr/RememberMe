<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RememberMe — Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #0d2137;
      color: #fff;
      padding: 1.25rem 1.5rem;
    }
    header h1 { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 700; }
    header p  { font-size: 0.8rem; opacity: 0.7; }
    main { max-width: 600px; margin: 3rem auto; padding: 0 1rem; text-align: center; }
    .result {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 2rem;
    }
    .result.success { border-top: 4px solid #4CAF50; }
    .result.error   { border-top: 4px solid #e53935; }
    .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .message { font-size: 1rem; color: #444; margin-bottom: 1.5rem; }
    .back-btn {
      display: inline-block;
      background: #1f3864;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .back-btn:hover { background: #162b4d; }
  </style>
</head>
<body>
<header>
  <h1>💳 RememberMe</h1>
  <p>Google Calendar Sync</p>
</header>
<main>
  <div class="result {{ status }}">
    <div class="icon">{% if status == "success" %}✅{% else %}❌{% endif %}</div>
    <p class="message">{{ message }}</p>
    <a href="/" class="back-btn">← Back to Dashboard</a>
  </div>
</main>
</body>
</html>
